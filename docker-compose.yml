services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      PUBLIC_API_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    ports:
      - '3000:3000'
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://nxr:secret@db:5431/homelab
      PORT: 3000
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nxr
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=homelab
    ports:
      - '5431:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  server_node_modules:
  client_node_modules:
